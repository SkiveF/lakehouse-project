services:

  minio:
    image: minio/minio
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  spark:
    image: apache/spark:3.5.0
    container_name: spark
    user: root
    entrypoint: /bin/bash
    command:
      - -c
      - |
        pip install pyyaml 2>/dev/null || pip3 install pyyaml 2>/dev/null
        # Download Hadoop AWS JARs if not already present
        JAR_DIR=/opt/spark/jars
        if [ ! -f $$JAR_DIR/hadoop-aws-3.3.4.jar ]; then
          echo "Downloading Hadoop AWS JARs..."
          curl -sL -o $$JAR_DIR/hadoop-aws-3.3.4.jar \
            https://repo1.maven.org/maven2/org/apache/hadoop/hadoop-aws/3.3.4/hadoop-aws-3.3.4.jar
          curl -sL -o $$JAR_DIR/aws-java-sdk-bundle-1.12.262.jar \
            https://repo1.maven.org/maven2/com/amazonaws/aws-java-sdk-bundle/1.12.262/aws-java-sdk-bundle-1.12.262.jar
        fi
        exec /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "8080:8080"
      - "7077:7077"
    volumes:
      - ../:/opt/project

  spark-worker:
    image: apache/spark:3.5.0
    container_name: spark-worker
    user: root
    depends_on:
      - spark
    entrypoint: /bin/bash
    command:
      - -c
      - |
        pip install pyyaml 2>/dev/null || pip3 install pyyaml 2>/dev/null
        JAR_DIR=/opt/spark/jars
        if [ ! -f $$JAR_DIR/hadoop-aws-3.3.4.jar ]; then
          echo "Downloading Hadoop AWS JARs..."
          curl -sL -o $$JAR_DIR/hadoop-aws-3.3.4.jar \
            https://repo1.maven.org/maven2/org/apache/hadoop/hadoop-aws/3.3.4/hadoop-aws-3.3.4.jar
          curl -sL -o $$JAR_DIR/aws-java-sdk-bundle-1.12.262.jar \
            https://repo1.maven.org/maven2/com/amazonaws/aws-java-sdk-bundle/1.12.262/aws-java-sdk-bundle-1.12.262.jar
        fi
        exec /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark:7077
    volumes:
      - ../:/opt/project

  airflow:
    image: apache/airflow:2.9.1
    container_name: airflow
    user: root
    depends_on:
      - spark
    ports:
      - "8081:8080"
    environment:
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=sqlite:////opt/airflow/airflow.db
    entrypoint: /bin/bash
    command:
      - -c
      - |
        pip install docker 2>/dev/null
        airflow db migrate
        airflow users create --username admin --firstname Admin --lastname User \
          --role Admin --email admin@example.com --password admin 2>/dev/null || true
        airflow scheduler &
        exec airflow webserver --port 8080
    volumes:
      - ../dags:/opt/airflow/dags
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  minio_data:
